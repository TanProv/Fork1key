<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hướng dẫn Xác minh - Batch Verifier</title>
    <link rel="stylesheet" href="/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <style>
        .guide-container {
            max-width: 900px;
            margin: 40px auto;
            padding: 30px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            line-height: 1.6;
        }

        .guide-content img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            margin: 20px 0;
            border: 1px solid var(--card-border);
        }

        .guide-content h1,
        .guide-content h2,
        .guide-content h3 {
            color: var(--text-primary);
            margin-top: 25px;
        }

        .guide-content p {
            margin-bottom: 15px;
            color: var(--text-secondary);
        }

        .guide-content ol,
        .guide-content ul {
            margin-bottom: 15px;
            padding-left: 20px;
            color: var(--text-secondary);
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--accent-primary);
            text-decoration: none;
            font-weight: 500;
            margin-bottom: 20px;
            transition: all 0.2s;
        }

        .back-btn:hover {
            opacity: 0.8;
            transform: translateX(-5px);
        }
    </style>
</head>

<body>
    <div class="app-container">
        <div class="guide-container">
            <a href="/" class="back-btn">
                <i class="fas fa-arrow-left"></i> Quay lại trang chủ
            </a>
            <div class="guide-content" id="guideContent">
                <!-- Content will be injected or was pre-rendered -->
            </div>
        </div>
    </div>

    <script>
        // Load the content from the generated file
        fetch('/guide-content.html')
            .then(res => res.text())
            .then(html => {
                document.getElementById('guideContent').innerHTML = html;
            });

        // Check for theme
        if (localStorage.getItem('theme') === 'light') {
            document.body.classList.add('light-mode');
        }
    </script>
</body>

</html>
