<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔐 Admin Dashboard - Batch Verifier</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <style>
        /* Admin Specific Overrides */
        .admin-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Login Overlay */
        #loginOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .login-box {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid var(--card-border);
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            width: 90%;
            max-width: 400px;
        }

        .login-input {
            width: 100%;
            padding: 12px;
            background: var(--bg-dark);
            border: 1px solid var(--card-border);
            border-radius: 8px;
            color: var(--text-primary);
            margin: 20px 0;
            font-size: 16px;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
            margin-top: 20px;
        }

        @media (max-width: 768px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
        }

        .key-table {
            width: 100%;
            border-collapse: collapse;
            color: var(--text-primary);
        }

        .key-table th,
        .key-table td {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid var(--card-border);
        }

        .key-table th {
            color: var(--text-secondary);
            font-weight: 500;
        }

        .badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-active {
            background: rgba(34, 197, 94, 0.2);
            color: #22c55e;
        }

        .badge-inactive {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-label {
            display: block;
            color: var(--text-secondary);
            margin-bottom: 5px;
            font-size: 14px;
        }

        .form-control {
            width: 100%;
            padding: 10px;
            background: var(--bg-dark);
            border: 1px solid var(--card-border);
            border-radius: 8px;
            color: var(--text-primary);
        }

        .copy-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            transition: color 0.2s;
        }

        .copy-btn:hover {
            color: #3b82f6;
        }
    </style>
</head>

<body>

    <!-- Login Overlay -->
    <div id="loginOverlay">
        <div class="login-box">
            <i class="fas fa-user-shield" style="font-size: 48px; color: #3b82f6; margin-bottom: 20px;"></i>
            <h2 style="color: var(--text-primary);">Quyền Admin</h2>
            <p style="color: var(--text-secondary);">Nhập mã bí mật để truy cập quản lý Key.</p>
            <input type="password" id="adminSecretInput" class="login-input" placeholder="Nhập ADMIN_SECRET...">
            <button class="btn-start" id="loginBtn" style="width: 100%;">Truy Cập</button>
        </div>
    </div>

    <!-- Main Dashboard -->
    <div class="app-container admin-container" id="adminDashboard" style="display: none;">
        <div class="card-header">
            <div class="header-left">
                <i class="fas fa-server" style="color: #3b82f6;"></i>
                <h2>Hệ Thống Quản Lý Proxy</h2>
            </div>
            <div class="header-right" style="display: flex; align-items: center; gap: 15px;">
                <!-- Master Quota Inventory Widget -->
                <div id="masterQuotaWidget"
                    style="background: var(--card-bg); border: 1px solid var(--card-border); padding: 8px 12px; border-radius: 8px; display: flex; align-items: center; gap: 10px; font-size: 13px;">
                    <div title="Tổng số lượng trong kho">
                        <i class="fas fa-warehouse" style="color: #3b82f6;"></i>
                        <span style="color: var(--text-secondary);">Kho:</span>
                        <span id="masterInventory" style="font-weight: bold; color: #fff;">...</span>
                    </div>
                    <div style="width: 1px; height: 15px; background: var(--card-border);"></div>
                    <div title="Số lượng đã trích ra cấp cho User">
                        <i class="fas fa-server" style="color: #f59e0b;"></i>
                        <span style="color: var(--text-secondary);">Pool:</span>
                        <span id="masterRemaining" style="font-weight: bold; color: #22c55e;">...</span>
                        <span style="color: var(--text-secondary);">/</span>
                        <span id="masterTotal" style="color: var(--text-secondary);">...</span>
                    </div>
                    <button id="editMasterQuotaBtn"
                        style="background: none; border: none; color: #3b82f6; cursor: pointer; padding: 2px 6px;">
                        <i class="fas fa-edit"></i>
                    </button>
                </div>
                <button class="btn-icon-text" id="logoutBtn">
                    <i class="fas fa-sign-out-alt"></i> Đăng Xuất
                </button>
            </div>
        </div>

        <div class="dashboard-grid">
            <!-- Left: Create Key -->
            <div class="card">
                <div class="card-header">
                    <div class="header-left">
                        <i class="fas fa-plus-circle"></i>
                        <h3>Tạo Key Mới</h3>
                    </div>
                </div>
                <div class="card-body">
                    <div class="form-group">
                        <label class="form-label">Tên khách / Tiền tố</label>
                        <input type="text" id="keyPrefix" class="form-control" placeholder="VD: vip_user_01">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Quota (Số lượt)</label>
                        <input type="number" id="keyQuota" class="form-control" value="1000">
                    </div>
                    <div class="form-group">
                        <button class="btn-start" id="generateBtn" style="width: 100%;">
                            <i class="fas fa-magic"></i> Tạo Key Ngay
                        </button>
                    </div>

                    <!-- Bulk Generation -->
                    <div style="border-top: 1px solid var(--card-border); padding-top: 15px; margin-top: 15px;">
                        <div class="form-group">
                            <label class="form-label">Số lượng Key (tối đa 50)</label>
                            <input type="number" id="bulkCount" class="form-control" value="5" min="1" max="50">
                        </div>
                        <button class="btn-icon-text" id="bulkGenerateBtn"
                            style="width: 100%; justify-content: center; background: linear-gradient(135deg, #f59e0b, #d97706); border: none; padding: 10px;">
                            <i class="fas fa-layer-group"></i> Tạo Hàng Loạt
                        </button>
                    </div>

                    <div id="newKeyResult"
                        style="margin-top: 20px; display: none; padding: 15px; background: rgba(34, 197, 94, 0.1); border-radius: 8px; border: 1px solid rgba(34, 197, 94, 0.3);">
                        <p style="color: #22c55e; font-weight: bold; margin-bottom: 5px;">✅ Đã tạo key thành công!</p>
                        <div style="display: flex; gap: 10px; align-items: center;">
                            <code id="codeResult"
                                style="background: #000; padding: 5px 10px; border-radius: 4px; color: #fff; flex: 1; max-height: 150px; overflow-y: auto; white-space: pre-wrap;">...</code>
                            <button class="copy-btn" id="copyNewKey"><i class="fas fa-copy"></i></button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right: List Keys -->
            <div class="card">
                <div class="card-header">
                    <div class="header-left">
                        <i class="fas fa-list"></i>
                        <h3>Danh Sách Key</h3>
                    </div>
                    <div class="header-right" style="display: flex; gap: 10px; align-items: center;">
                        <input type="text" id="keySearch" class="form-control" placeholder="🔍 Tìm key..."
                            style="width: 200px; padding: 6px 10px; font-size: 13px;">
                        <button class="btn-icon-text" id="refreshBtn">
                            <i class="fas fa-sync-alt"></i>
                        </button>
                    </div>
                </div>
                <div class="card-body" style="padding: 0;">
                    <div style="overflow-x: auto;">
                        <table class="key-table">
                            <thead>
                                <tr>
                                    <th>Key</th>
                                    <th>Đã Dùng</th>
                                    <th>Còn Lại</th>
                                    <th>Tổng Quota</th>
                                    <th>Trạng Thái</th>
                                    <th>Hành động</th>
                                </tr>
                            </thead>
                            <tbody id="keysTableBody">
                                <!-- Populated by JS -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/admin.js"></script>
</body>

</html>
